name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies for Qt
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libegl1 libxkbcommon0 libdbus-1-3

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run import smoke test
        run: python -c "import splatsdb_ui; print(f'splatsdb-ui v{splatsdb_ui.__version__} import ok')"

      - name: Run unit tests
        run: python -m pytest tests/test_core.py -v

      - name: Verify presets use 1024d (SplatDB v2.6 compatibility)
        run: |
          python -c "
          from splatsdb_ui.engine_manager import PRESETS
          for name, p in PRESETS.items():
              if name == 'custom':
                  continue
              assert p['latent_dim'] == 1024, f'{name}: {p[\"latent_dim\"]}'
          print('All presets 1024d OK')
          "

      - name: Verify bge-m3 is registered
        run: |
          python -c "
          from splatsdb_ui.embeddings.registry import KNOWN_MODELS
          assert 'bge-m3' in KNOWN_MODELS
          assert KNOWN_MODELS['bge-m3'].dimension == 1024
          print('bge-m3 registered OK')
          "

      - name: Verify no unconnected buttons
        run: |
          python -c "
          import re, os
          unconnected = []
          for root, dirs, files in os.walk('splatsdb_ui'):
              for f in files:
                  if not f.endswith('.py'): continue
                  path = os.path.join(root, f)
                  with open(path) as fh: content = fh.read()
                  for btn in re.findall(r'(\w+)\s*=\s*QPushButton\(', content):
                      if not re.search(rf'{btn}\.clicked\.connect|{btn}\.toggled\.connect', content):
                          for i, line in enumerate(content.split('\n'), 1):
                              if f'{btn} = QPushButton(' in line:
                                  unconnected.append(f'{path}:{line}'); break
          assert not unconnected, f'Unconnected buttons: {unconnected}'
          print('All buttons connected OK')
          "
