name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run import smoke test
        run: python -c "import splatsdb_ui; print('import ok')"

      - name: Run unit tests
        run: python -m pytest tests/test_core.py -v

      - name: Verify presets use 1024d (SplatDB v2.6 compatibility)
        run: |
          python -c "
          from splatsdb_ui.engine_manager import PRESETS
          for name, p in PRESETS.items():
              if name == 'custom':
                  continue
              assert p['latent_dim'] == 1024, f'{name}: {p[\"latent_dim\"]}'
          print('All presets 1024d OK')
          "

      - name: Verify bge-m3 is registered
        run: |
          python -c "
          from splatsdb_ui.embeddings.registry import KNOWN_MODELS
          assert 'bge-m3' in KNOWN_MODELS
          assert KNOWN_MODELS['bge-m3'].dimension == 1024
          print('bge-m3 registered OK')
          "
